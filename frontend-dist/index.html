<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #0a0a0a; color: #e5e5e5;
    }
    .loader { text-align: center; }
    .loader h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #333;
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ef4444; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="loader">
    <h1>My Library</h1>
    <div class="spinner"></div>
    <p>Starting server...</p>
    <p class="error" id="error">Failed to connect. Please restart the app.</p>
  </div>
  <script>
    const PORT = '3007';
    const SERVER_URL = 'http://127.0.0.1:' + PORT;
    let attempts = 0;
    const MAX_ATTEMPTS = 40;

    function checkServer() {
      attempts++;
      fetch(SERVER_URL, { mode: 'no-cors' })
        .then(() => {
          window.location.href = SERVER_URL;
        })
        .catch(() => {
          if (attempts < MAX_ATTEMPTS) {
            setTimeout(checkServer, 750);
          } else {
            document.getElementById('error').style.display = 'block';
          }
        });
    }
    checkServer();
  </script>
</body>
</html>
